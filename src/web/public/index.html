<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silicon Rider Bench - Web Visualization</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Statistics Panel (Top - Horizontal with Header) -->
    <section class="stats-panel">
        <!-- Header Section -->
        <div class="header-section">
            <div class="header-content">
                <h1>🚴 Silicon Rider Bench</h1>
                <p class="subtitle">AI Delivery Agent Simulation</p>
            </div>
            <div id="connection-status" class="connection-status disconnected">
                <span class="status-dot"></span>
                <span class="status-text">Disconnected</span>
            </div>
        </div>
        
        <!-- Stats Content -->
        <div id="stats-panel" class="stats-content">
            <!-- Stats will be rendered here by JavaScript -->
        </div>
    </section>

    <!-- Main Content Area -->
    <div class="container">
        <!-- Map Area (Left - 50%) -->
        <main class="main-content">
            <div id="map-container" class="map-container">
                <!-- Map will be rendered here by JavaScript -->
            </div>
        </main>

        <!-- Conversation Panel (Right - 50%) -->
        <aside id="chat-panel" class="chat-panel">
            <!-- Chat will be rendered here by JavaScript -->
        </aside>
    </div>

    <!-- JavaScript - Load dependencies first, then main -->
    <script src="/js/map-renderer.js"></script>
    <script src="/js/stats-panel.js"></script>
    <script src="/js/chat-panel.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
